<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psikotest Gambar - Subtes 2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 95%; max-width: 1000px; text-align: center; position: relative; }
        .hidden { display: none !important; }
        
        .options { display: flex; flex-wrap: nowrap; justify-content: center; gap: 10px; margin: 30px 0; overflow-x: auto; }
        .option-item { flex: 0 1 auto; }
        .option-img { width: 150px; height: auto; cursor: pointer; border: 4px solid #f0f0f0; border-radius: 8px; transition: all 0.3s ease; }
        input[type="checkbox"] { display: none; }
        input[type="checkbox"]:checked + label img { border-color: #007bff; background: #e7f1ff; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,123,255,0.3); }

        .action-bar { margin-top: 30px; display: flex; gap: 15px; justify-content: center; border-top: 1px solid #eee; padding-top: 20px; }
        button { padding: 12px 30px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 8px; border: none; transition: 0.2s; }
        #scoreButton { background: #28a745; color: white; }
        #scoreButton:disabled { background: #ccc; cursor: not-allowed; }
        #startButton { background: #007bff; color: white; padding: 15px 40px; }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loader-text" style="margin-top:15px; font-weight:bold;">Memproses Data...</p>
        <div id="debug-log" style="font-size:11px; color:#666; margin-top:10px; text-align:left; background:#eee; padding:5px; border-radius:4px;"></div>
    </div>

    <div class="quiz-container">
        <h1 id="title">Psikotest Gambar - Subtes 2</h1>
        <button id="startButton" class="hidden" onclick="startGame()">Mulai Tes</button>
        
        <div id="question" class="hidden"></div>
        <div class="options hidden" id="optionsGrid"></div>
        
        <div class="action-bar hidden" id="actionBar">
            <button onclick="calculateScore()" id="scoreButton" disabled>Jawab</button>
            <button onclick="skipQuestion()" id="skipButton">Lewati</button>
        </div>
        <div id="timer" style="margin-top:20px; font-weight:bold; color:#d9534f;"></div>
    </div>

    <script>
        const API_URL = 'https://lidan-co-id.pages.dev/api/contacts_filter_dinamis6';
        const TABLE_NAME = 'nilai1';
        const AUTH_KEY = 'admin';

        let quizData = [];
        let correctScore = 0;
        let timeLeft = 300;
        let currentQuestionIndex = 0;
        let userAnswers = []; // Untuk menampung log jawaban
        let timerInterval;

        function logDebug(msg) {
            console.log(`[DEBUG] ${msg}`);
            const logDiv = document.getElementById('debug-log');
            if(logDiv) logDiv.innerHTML += `> ${msg}<br>`;
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            if(loader) loader.style.display = 'none';
        }

        window.onload = async () => {
            logDebug("Inisialisasi...");
            const idX = localStorage.getItem('db_id');

            if (!idX) {
                window.location.href = 'index1.html';
                return;
            }

            try {
                const resp = await fetch(`${API_URL}?table=${TABLE_NAME}&id_x=${idX}`, {
                    headers: { 'X-Custom-Auth': AUTH_KEY }
                });
                const result = await resp.json();

                if (result.success && result.data) {
                    const user = result.data;
                    const x05 = user.x_05 ? user.x_05.split('|') : ["", "", "", ""];

                    if (x05[1] && x05[1].trim() !== "") {
                        alert("Subtes ini sudah dikerjakan.");
                        window.location.href = 'index1.html';
                        return;
                    }

                    document.getElementById("startButton").classList.remove("hidden");
                }
            } catch (err) {
                logDebug(`Error: ${err.message}`);
            } finally {
                setTimeout(hideLoader, 500);
            }
        };

        async function startGame() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            document.getElementById('loader-text').innerText = "Memuat Soal...";

            try {
                const response = await fetch('https://cipta.my.id/psikotest/cfit2_a.txt');
                quizData = await response.json();
                
                document.getElementById("startButton").classList.add("hidden");
                document.getElementById("title").classList.add("hidden");
                document.getElementById("actionBar").classList.remove("hidden");
                
                hideLoader();
                startTimer();
                loadQuestion();
            } catch (e) {
                alert("Gagal memuat soal.");
                hideLoader();
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById("timer").innerText = `Waktu: ${timeLeft}s`;
                if (timeLeft <= 0) endGame(true);
            }, 1000);
        }

        function loadQuestion() {
            if (currentQuestionIndex >= quizData.length) {
                endGame(false);
                return;
            }

            const currentQuestion = quizData[currentQuestionIndex];
            const questionEl = document.getElementById("question");
            questionEl.innerHTML = "<h3>Pilih 2 gambar yang berbeda dari lainnya.</h3>";
            questionEl.classList.remove("hidden");

            const optionsDiv = document.getElementById("optionsGrid");
            optionsDiv.innerHTML = "";
            optionsDiv.classList.remove("hidden");

            currentQuestion.options.forEach((option, index) => {
                const wrapper = document.createElement("div");
                wrapper.className = "option-item";
                wrapper.innerHTML = `
                    <input type="checkbox" id="opt${index}" value="${option}">
                    <label for="opt${index}"><img src="${option}" class="option-img"></label>
                `;
                
                wrapper.querySelector('input').addEventListener('change', () => {
                    const checked = document.querySelectorAll('#optionsGrid input:checked');
                    document.getElementById("scoreButton").disabled = (checked.length !== 2);
                });
                optionsDiv.appendChild(wrapper);
            });
        }

        function calculateScore() {
            const currentQuestion = quizData[currentQuestionIndex];
            const selected = Array.from(document.querySelectorAll('#optionsGrid input:checked')).map(cb => cb.value);
            
            const isCorrect = selected.length === 2 && 
                              selected.every(val => currentQuestion.correctAnswers.includes(val));
            
            // Catat log jawaban: Nomor Soal + Hasil (v/x)
            const questionNum = currentQuestionIndex + 1;
            const resIndicator = isCorrect ? 'v' : 'x';
            userAnswers.push(`${questionNum}SEL${resIndicator}`);
            
            if (isCorrect) correctScore++;
            currentQuestionIndex++;
            loadQuestion();
        }

        function skipQuestion() {
            const questionNum = currentQuestionIndex + 1;
            userAnswers.push(`${questionNum}SKIPx`); // Catat log lewati soal
            currentQuestionIndex++;
            loadQuestion();
        }

        async function endGame(timeout) {
            clearInterval(timerInterval);
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader-text').innerText = "Menyimpan Skor...";

            const idX = localStorage.getItem('db_id');

            try {
                const resp = await fetch(`${API_URL}?table=${TABLE_NAME}&id_x=${idX}`, {
                    headers: { 'X-Custom-Auth': AUTH_KEY }
                });
                const result = await resp.json();
                
                // Olah x_05 (Skor) ke Indeks 1
                let x05_parts = result.data.x_05 ? result.data.x_05.split('|') : ["", "", "", ""];
                x05_parts[1] = correctScore.toString();

                // Olah x_08 (Log Jawaban) ke Indeks 1
                let x08_parts = result.data.x_08 ? result.data.x_08.split('|') : ["", "", "", ""];
                x08_parts[1] = `['${userAnswers.join("', '")}']`;

                await fetch(`${API_URL}?table=${TABLE_NAME}&id_x=${idX}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Custom-Auth': AUTH_KEY },
                    body: JSON.stringify({ 
                        x_05: x05_parts.join('|'),
                        x_08: x08_parts.join('|')
                    })
                });

                alert(timeout ? "Waktu habis! Tes Selesai." : `Tes Selesai. Skor: ${correctScore}`);
                window.location.href = 'index1.html';
            } catch (err) {
                alert("Gagal menyimpan skor.");
                hideLoader();
            }
        }
    </script>
</body>
</html>
