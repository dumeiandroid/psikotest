<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soal Psikotest - CFIT 1</title>
    <link rel="stylesheet" href="css_tes.css">
    <style>
        .hidden { display: none; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .question-image { display: block; margin: 0 auto 20px auto; max-width: 300px; }
        .options { display: flex; flex-wrap: nowrap; justify-content: center; gap: 10px; margin-top: 20px; overflow-x: auto; }
        .options img { max-width: 120px; cursor: pointer; border: 2px solid #ccc; border-radius: 5px; transition: 0.2s; }
        .options img:hover { transform: scale(1.05); border-color: #007bff; }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay hidden">
        <p>Mohon Tunggu, Memproses Data...</p>
    </div>

    <h1 id="title-header" style="text-align: center;">Kerjakan Dengan Teliti</h1>

    <div style="text-align: center;">
        <button id="startButton" onclick="startGame()" class="hidden">Start</button>
    </div>
    
    <div class="image">
        <div id="question" class="hidden"></div>
        <div class="options hidden"></div>
        <button id="skipButton" class="skip-btn hidden" onclick="skipQuestion()">Lewati Soal</button>
    </div>
    
    <div id="timer" class="hidden" style="text-align: center; margin-top: 20px;">Waktu Tersisa: 240 detik</div>

    <script>
        const API_URL = 'https://lidan-co-id.pages.dev/api/contacts_filter_dinamis6';
        const TABLE_NAME = 'nilai1';
        const AUTH_KEY = 'admin';

        let correctScore = 0;
        let wrongScore = 0;
        let timeLeft = 240;
        let currentQuestionIndex = 0;
        let questions = [];
        let userAnswers = []; 
        let timerInterval;

        window.onload = async () => {
            const token = localStorage.getItem('token');
            const idX = localStorage.getItem('db_id');

            if (!token || !idX) {
                location.href = 'index1.html';
                return;
            }

            toggleLoader(true);
            try {
                const resp = await fetch(`${API_URL}?table=${TABLE_NAME}&id_x=${idX}`, {
                    headers: { 'X-Custom-Auth': AUTH_KEY }
                });
                const result = await resp.json();
                
                if (!result.success) throw new Error("User tidak ditemukan");

                const user = result.data;
                const bio = user.x_02 ? user.x_02.split('|') : [];
                const soalStatus = user.x_05 ? user.x_05.split('|') : [];

                if (!bio[0] || bio[0].trim() === "") {
                    location.href = 'index1.html';
                    return;
                }

                if (soalStatus[0] && soalStatus[0].trim() !== "") {
                    alert("Anda sudah mengerjakan soal ini.");
                    location.href = 'index1.html';
                    return;
                }

                await fetchQuestions();
                document.getElementById("startButton").classList.remove("hidden");
            } catch (err) {
                console.error(err);
                location.href = 'index1.html';
            } finally {
                toggleLoader(false);
            }
        };

        async function fetchQuestions() {
            const response = await fetch('https://cipta.my.id/psikotest/cfit1.txt');
            questions = await response.json();
            loadGameState();
        }

        function toggleLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
        }

        function loadGameState() {
            const savedState = localStorage.getItem('gameState0');
            if (savedState) {
                const state = JSON.parse(savedState);
                correctScore = state.correctScore || 0;
                wrongScore = state.wrongScore || 0;
                currentQuestionIndex = state.currentQuestionIndex || 0;
                userAnswers = state.userAnswers || [];
                timeLeft = state.timeLeft || 240;
            }
        }

        function startGame() {
            document.getElementById("startButton").classList.add("hidden");
            document.getElementById("title-header").classList.add("hidden");
            document.getElementById("timer").classList.remove("hidden");
            startTimer();
            newQuestion();
            document.querySelector(".options").classList.remove("hidden");
            document.getElementById("question").classList.remove("hidden");
            document.getElementById("skipButton").classList.remove("hidden");
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById("timer").innerText = `Waktu Tersisa: ${timeLeft} detik`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endGame(true);
                } else {
                    saveGameState();
                }
            }, 1000);
        }

        function newQuestion() {
            if (currentQuestionIndex >= questions.length) {
                endGame(false);
                return;
            }

            let currentQuestion = questions[currentQuestionIndex];
            const questionParts = currentQuestion.question.split(' ');
            document.getElementById("question").innerHTML = `<h3>Soal ${questionParts[0]}</h3><img class="question-image" src="${questionParts[1]}" alt="">`;

            const optionsDiv = document.querySelector(".options");
            optionsDiv.innerHTML = "";

            for (const option in currentQuestion.options) {
                if (currentQuestion.options[option]) {
                    const img = document.createElement("img");
                    img.src = currentQuestion.options[option];
                    img.onclick = () => submitAnswer(option, currentQuestion.answer);
                    optionsDiv.appendChild(img);
                }
            }
        }

        function submitAnswer(option, correctAnswer) {
            const questionNumber = questions[currentQuestionIndex].question.split('.')[0];
            const resultIndicator = (option === correctAnswer) ? 'v' : 'x';
            
            // Mencatat log jawaban (NomorSoal + Pilihan + IndikatorBenar/Salah)
            userAnswers.push(`${questionNumber}${option}${resultIndicator}`);

            if (option === correctAnswer) correctScore++;
            else wrongScore++;

            currentQuestionIndex++;
            newQuestion();
            saveGameState();
        }

        function skipQuestion() {
            const questionNumber = questions[currentQuestionIndex].question.split('.')[0];
            userAnswers.push(`${questionNumber}SKIPx`);
            
            currentQuestionIndex++;
            newQuestion();
            saveGameState();
        }

        async function endGame(timeout) {
            clearInterval(timerInterval);
            toggleLoader(true);

            document.querySelector(".options").classList.add("hidden");
            document.getElementById("skipButton").classList.add("hidden");
            document.getElementById("question").innerHTML = timeout ? "Waktu Habis!" : "Soal Selesai!";
            
            const idX = localStorage.getItem('db_id');

            try {
                const resp = await fetch(`${API_URL}?table=${TABLE_NAME}&id_x=${idX}`, {
                    headers: { 'X-Custom-Auth': AUTH_KEY }
                });
                const userData = await resp.json();
                
                // Menyiapkan bagian x_05 dan x_08 (memecah data lama agar tidak hilang)
                let x05_parts = userData.data.x_05 ? userData.data.x_05.split('|') : ["", "", "", ""];
                let x08_parts = userData.data.x_08 ? userData.data.x_08.split('|') : ["", "", "", ""];

                // Mengisi indeks ke-0 dengan data terbaru
                x05_parts[0] = correctScore.toString();
                x08_parts[0] = `['${userAnswers.join("', '")}']`;

                const updateResp = await fetch(`${API_URL}?table=${TABLE_NAME}&id_x=${idX}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Custom-Auth': AUTH_KEY 
                    },
                    body: JSON.stringify({ 
                        x_05: x05_parts.join('|'),
                        x_08: x08_parts.join('|') 
                    })
                });

                if (updateResp.ok) {
                    localStorage.removeItem('gameState0');
                    alert(`Skor Anda (${correctScore}) dan log jawaban telah disimpan.`);
                    location.href = 'index1.html';
                } else {
                    alert("Gagal menyimpan data ke server.");
                }
            } catch (err) {
                console.error(err);
                alert("Terjadi kesalahan saat menyimpan data.");
            } finally {
                toggleLoader(false);
            }
        }

        function saveGameState() {
            const gameState = { correctScore, wrongScore, currentQuestionIndex, userAnswers, timeLeft };
            localStorage.setItem('gameState0', JSON.stringify(gameState));
        }
    </script>
</body>
</html>
